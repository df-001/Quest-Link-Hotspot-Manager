<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Link Hotspot Manager</title>
    <link rel="stylesheet" href="/styles.css" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=wifi_tethering" />
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="card">
        <!-- Logo -->
        <span style="font-size: 4rem;" class="material-symbols-outlined">
        wifi_tethering
        </span>

        <!-- Text -->
         <h1 class="main-title">Quest Link Hotspot Manager</h1>
        <h1 class="title">Welcome back</h1>
        <p class="subtitle">Select your WiFi adapter and get started.</p>

        <p id="status" class="status">Not running...</p>

        <div class="dropdown" id="myDropdown">
          <div class="dropdown-selected">Select an adapter</div>
          <div class="dropdown-options">
            <div class="dropdown-option" data-value="null">None</div>
          </div>
        </div>

        <button id="start-btn" class="btn btn-primary" type="button">
            Start Hotspot
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <button id="end-btn" class="btn btn-primary" type="button" disabled>
        End Hotspot
        </button>

        <div class="footer">
            <a id="refresh-btn" class="pnter">Refresh</a>
        </div>
    </div>

    <script type="module" src="/script.js"></script>
</body>
</html>
